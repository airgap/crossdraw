<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Crossdraw</title>
    <style>
      /* ── Reset ─────────────────────────────────────── */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      html {
        /* Prevent pull-to-refresh and overscroll bounce */
        overscroll-behavior: none;
      }
      body {
        background: #1a1a1a;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
        font-size: 12px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Prevent text selection on UI chrome (not inputs) */
        -webkit-user-select: none;
        user-select: none;
        /* Prevent elastic overscroll */
        overscroll-behavior: none;
        overflow: hidden;
        /* Kill tap highlight on all elements */
        -webkit-tap-highlight-color: transparent;
        /* Prevent long-press callout (save image, copy, etc.) */
        -webkit-touch-callout: none;
      }
      /* Re-enable text selection for text inputs */
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }

      /* ── Scrollbar styling ─────────────────────────── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.15);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.25);
      }
      ::-webkit-scrollbar-corner { background: transparent; }

      /* Firefox scrollbar */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.15) transparent;
      }

      /* ── Transitions ───────────────────────────────── */
      button, [role="button"], [role="menuitem"], input, select, textarea, .interactive {
        transition: background-color 150ms ease,
                    border-color 150ms ease,
                    opacity 150ms ease,
                    box-shadow 150ms ease,
                    color 150ms ease;
      }

      /* ── Active press feedback — instant darken ───── */
      button:active, [role="button"]:active {
        opacity: 0.7;
        transition: opacity 0ms;
      }

      /* ── Disabled state ──────────────────────────── */
      button:disabled, button[aria-disabled="true"] {
        opacity: 0.4;
        cursor: not-allowed;
        pointer-events: none;
      }
      [role="menuitem"][aria-disabled="true"] {
        opacity: 0.4;
        cursor: default;
      }

      /* ── Focus visible ring ────────────────────────── */
      button:focus-visible,
      [role="button"]:focus-visible,
      [role="menuitem"]:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid var(--accent, #4a9eff);
        outline-offset: -2px;
      }
      /* Hide focus ring on touch (only show on keyboard nav) */
      button:focus:not(:focus-visible),
      [role="button"]:focus:not(:focus-visible),
      [role="menuitem"]:focus:not(:focus-visible) {
        outline: none;
      }

      /* ── Toolbar & status bar hover ──────────────── */
      .cd-hoverable:hover {
        background: var(--bg-hover) !important;
      }
      .cd-hoverable[aria-pressed="true"]:hover {
        background: var(--accent-hover, var(--accent)) !important;
      }

      /* ── Input base ────────────────────────────────── */
      input, select, textarea {
        font-family: inherit;
        font-size: inherit;
      }

      /* Remove number input spinners */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }

      /* Prevent iOS zoom on input focus (font-size < 16px triggers zoom) */
      .touch-mode input, .touch-mode select, .touch-mode textarea {
        font-size: 16px !important;
      }

      /* ── Selection highlight ───────────────────────── */
      ::selection {
        background: rgba(74, 158, 255, 0.3);
        color: inherit;
      }

      /* ── Touch mode: enlarged hit targets (44px Apple HIG) ── */
      .touch-mode button {
        min-width: 44px;
        min-height: 44px;
      }
      .touch-mode input {
        min-height: 36px;
      }
      .touch-mode select {
        min-height: 36px;
      }
      .touch-mode label {
        min-height: 36px;
        display: inline-flex;
        align-items: center;
      }

      /* ── Prevent context menu on long-press in UI chrome ── */
      button, [role="button"], nav, .toolbar, .menu-bar, .status-bar, .panel-header {
        -webkit-touch-callout: none;
      }

      /* ── Screen reader only (visually hidden) ───────── */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      /* Show when focused (skip navigation link) */
      .focus\:not-sr-only:focus {
        position: fixed;
        top: 4px;
        left: 4px;
        width: auto;
        height: auto;
        padding: 8px 16px;
        margin: 0;
        overflow: visible;
        clip: auto;
        white-space: normal;
        z-index: 10000;
        background: var(--bg-overlay, #2a2a2a);
        color: #fff;
        border: 2px solid #4a9eff;
        border-radius: 4px;
        font-size: 14px;
        text-decoration: none;
        outline: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      }

      /* ── High contrast mode support ──────────────────── */
      @media (prefers-contrast: high) {
        :root {
          --border-subtle: rgba(255,255,255,0.5);
          --border-default: rgba(255,255,255,0.7);
        }
        button, [role="button"], [role="tab"], [role="menuitem"] {
          border: 1px solid rgba(255,255,255,0.4) !important;
        }
        button:focus-visible,
        [role="tab"]:focus-visible,
        [role="menuitem"]:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
          outline: 3px solid #4a9eff;
          outline-offset: 1px;
        }
        [role="toolbar"] {
          border-right: 2px solid rgba(255,255,255,0.5) !important;
        }
        [role="menubar"] {
          border-bottom: 2px solid rgba(255,255,255,0.5) !important;
        }
        [role="menu"] {
          border: 2px solid rgba(255,255,255,0.6) !important;
        }
        [role="region"] {
          border: 1px solid rgba(255,255,255,0.3) !important;
        }
        [role="tablist"] {
          border-bottom: 2px solid rgba(255,255,255,0.4) !important;
        }
        [aria-pressed="true"] {
          outline: 2px solid #fff !important;
          outline-offset: -2px;
        }
        [aria-selected="true"] {
          border-bottom: 2px solid #4a9eff !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
