<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Crossdraw</title>
    <style>
      /* ── Reset ─────────────────────────────────────── */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      html {
        /* Prevent pull-to-refresh and overscroll bounce */
        overscroll-behavior: none;
      }
      body {
        background: #1a1a1a;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
        font-size: 12px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Prevent text selection on UI chrome (not inputs) */
        -webkit-user-select: none;
        user-select: none;
        /* Prevent elastic overscroll */
        overscroll-behavior: none;
        overflow: hidden;
        /* Kill tap highlight on all elements */
        -webkit-tap-highlight-color: transparent;
        /* Prevent long-press callout (save image, copy, etc.) */
        -webkit-touch-callout: none;
      }
      /* Re-enable text selection for text inputs */
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }

      /* ── Scrollbar styling ─────────────────────────── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.15);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.25);
      }
      ::-webkit-scrollbar-corner { background: transparent; }

      /* Firefox scrollbar */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.15) transparent;
      }

      /* ── Transitions ───────────────────────────────── */
      button, [role="button"], input, select, textarea, .interactive {
        transition: background-color 80ms ease-out,
                    border-color 80ms ease-out,
                    opacity 80ms ease-out,
                    box-shadow 80ms ease-out,
                    color 80ms ease-out;
      }

      /* ── Active press feedback — instant darken ───── */
      button:active, [role="button"]:active {
        opacity: 0.7;
        transition: opacity 0ms;
      }

      /* ── Focus visible ring ────────────────────────── */
      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid #4a9eff;
        outline-offset: -1px;
      }
      /* Hide focus ring on touch (only show on keyboard nav) */
      button:focus:not(:focus-visible) {
        outline: none;
      }

      /* ── Input base ────────────────────────────────── */
      input, select, textarea {
        font-family: inherit;
        font-size: inherit;
      }

      /* Remove number input spinners */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }

      /* Prevent iOS zoom on input focus (font-size < 16px triggers zoom) */
      .touch-mode input, .touch-mode select, .touch-mode textarea {
        font-size: 16px !important;
      }

      /* ── Selection highlight ───────────────────────── */
      ::selection {
        background: rgba(74, 158, 255, 0.3);
        color: inherit;
      }

      /* ── Touch mode: enlarged hit targets (44px Apple HIG) ── */
      .touch-mode button {
        min-width: 44px;
        min-height: 44px;
      }
      .touch-mode input {
        min-height: 36px;
      }
      .touch-mode select {
        min-height: 36px;
      }
      .touch-mode label {
        min-height: 36px;
        display: inline-flex;
        align-items: center;
      }

      /* ── Prevent context menu on long-press in UI chrome ── */
      button, [role="button"], nav, .toolbar, .menu-bar, .status-bar, .panel-header {
        -webkit-touch-callout: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
