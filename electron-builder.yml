appId: com.crossdraw.app
productName: Crossdraw
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules"
asar: true
npmRebuild: false

mac:
  category: public.app-category.graphics-design
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico

linux:
  maintainer: airgap
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Graphics
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

fileAssociations:
  - ext: design
    name: Design File
    description: Crossdraw project file
    role: Editor

publish: null
