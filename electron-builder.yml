appId: com.designer.app
productName: Designer
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules"
asar: true

mac:
  category: public.app-category.graphics-design
  target:
    - dmg
    - zip
  icon: build/icon.icns

win:
  target:
    - nsis
    - portable
  icon: build/icon.ico

linux:
  target:
    - AppImage
    - deb
  category: Graphics
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

fileAssociations:
  - ext: design
    name: Design File
    description: Designer project file
    role: Editor
