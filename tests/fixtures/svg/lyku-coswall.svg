<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Deep space background gradient -->
  <defs>
    <radialGradient id="blackhole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="40%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="85%" stop-color="#4a4a8a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9bb0ff" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Black hole with accretion disk glow -->
  <circle cx="12" cy="12" r="11" fill="url(#blackhole)"/>
  <circle cx="12" cy="12" r="11" fill="url(#glow)"/>

  <!-- Gravitational lensing ring -->
  <circle cx="12" cy="12" r="6" fill="none" stroke="#6b7db3" stroke-width="0.5" opacity="0.6"/>
  <ellipse cx="12" cy="12" rx="8" ry="3" fill="none" stroke="#9bb0ff" stroke-width="0.8" opacity="0.4" transform="rotate(-20 12 12)"/>

  <!-- Event horizon -->
  <circle cx="12" cy="12" r="3" fill="#000"/>

  <!-- Stars twinkling around -->
  <circle cx="4" cy="5" r="0.6" fill="#fff" opacity="0.9"/>
  <circle cx="19" cy="4" r="0.4" fill="#9bb0ff" opacity="0.8"/>
  <circle cx="20" cy="18" r="0.5" fill="#fff" opacity="0.7"/>
  <circle cx="5" cy="19" r="0.4" fill="#b0c4ff" opacity="0.8"/>
  <circle cx="8" cy="3" r="0.3" fill="#fff" opacity="0.6"/>
  <circle cx="16" cy="20" r="0.35" fill="#9bb0ff" opacity="0.7"/>
  <circle cx="3" cy="12" r="0.4" fill="#fff" opacity="0.5"/>
  <circle cx="21" cy="10" r="0.3" fill="#b0c4ff" opacity="0.6"/>

  <!-- Distant stars -->
  <circle cx="6" cy="8" r="0.2" fill="#fff" opacity="0.4"/>
  <circle cx="17" cy="7" r="0.25" fill="#fff" opacity="0.5"/>
  <circle cx="18" cy="14" r="0.2" fill="#9bb0ff" opacity="0.4"/>
  <circle cx="7" cy="16" r="0.25" fill="#fff" opacity="0.5"/>
</svg>
